"""
Vault V1 transfer data
"""
type VaultV1TransferData {
  from: String!
  to: String!
}

"""
Cursor anchor for Vault V1 transactions.
"""
type VaultV1TransactionCursor {
  """Transaction hash of the cursor anchor."""
  txHash: HexString!
  """Log index of the cursor anchor."""
  logIndex: Int!
}

"""
Page info for Vault V1 transactions cursor pagination.
"""
type VaultV1TransactionsPageInfo {
  """Whether more items exist after this page."""
  hasNextPage: Boolean!
  """Cursor anchor of the last item in this page. Pass to `where.cursor` to fetch the next page when `hasNextPage` is true. Null only when this page is empty."""
  endCursor: VaultV1TransactionCursor
  """Number of items returned in this page (== items.length)."""
  count: Int!
}

type PaginatedVaultV1Transactions {
  items: [VaultV1Transaction!]
  pageInfo: VaultV1TransactionsPageInfo
