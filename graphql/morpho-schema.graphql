  blockNumber: BigInt!
  shares: BigInt!
  txIndex: Int!
  logIndex: Int!
  type: VaultV1TransactionType!
  data: VaultV1TransactionData!
  """Underlying assets amount. For transfers this is an approximation derived from the hour bucket share price or the latest current-hour state, and may be null when no valuation state is available."""
